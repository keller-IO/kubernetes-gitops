# One Application per apps/overlays/main/<app> directory.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/keller-IO/kubernetes-gitops.git
        revision: main
        directories:
          - path: apps/overlays/main/*
  template:
    metadata:
      name: "app-{{.path.basename}}"
      annotations:
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: apps
      source:
        repoURL: https://github.com/keller-IO/kubernetes-gitops.git
        targetRevision: main
        path: "{{.path.path}}"
        # Native kustomize (repo-server runs it with --enable-helm --enable-alpha-plugins
        # --enable-exec + ksops in PATH; see infrastructure/base/argocd + Terraform argocd.tf).
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
