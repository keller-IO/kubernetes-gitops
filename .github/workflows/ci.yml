# CI: lint + validate every manifest renders & passes schema, plus a security scan.
# GitHub Actions. Mirrors .forgejo/workflows/ci.yaml (Forgejo) and adds Trivy.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # YAML syntax / formatting.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install yamllint
        run: pipx install yamllint
      - name: yamllint
        run: yamllint -s .

  # Render every overlay (helm inflation enabled) and validate against K8s/CRD schemas.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v4

      - name: Install kustomize + kubeconform
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          curl -sSfL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kustomize kubeconform /usr/local/bin/
          # KSOPS-Stub: CI hat keinen age-Key, Secrets werden nicht gerendert.
          printf '#!/bin/sh\nexit 0\n' | sudo tee /usr/local/bin/ksops >/dev/null
          sudo chmod +x /usr/local/bin/ksops

      - name: kustomize build + kubeconform
        run: |
          set -euo pipefail
          for dir in apps/overlays/main/*/ infrastructure/base/*/; do
            [ -f "$dir/kustomization.yaml" ] || continue
            echo "== $dir"
            kustomize build --enable-helm --enable-alpha-plugins --enable-exec "$dir" \
              | kubeconform -strict -ignore-missing-schemas -summary
          done

  # Blueprint phase: secrets are placeholder templates, not yet SOPS-encrypted.
  # Warn only — flip to a hard failure once real secrets are encrypted.
  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Warn on unencrypted *.sops.yaml (non-blocking)
        run: |
          while IFS= read -r f; do
            grep -q "sops:" "$f" || echo "::warning file=$f::$f is not SOPS-encrypted"
          done < <(find . -name '*.sops.yaml' -not -name '.sops.yaml')

  # Static security scan of the rendered manifests (misconfig) + repo (secrets).
  # Reports findings; does NOT fail the build yet — add `--exit-code 1` to enforce.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v4

      - name: Install kustomize + Trivy
        env:
          # renovate: datasource=github-releases depName=aquasecurity/trivy
          TRIVY_VERSION: 0.72.0
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/
          # Gepinnter Direkt-Download statt install.sh: das godownloader-Script
          # fragt die GitHub-API nach "latest" und läuft auf Shared-Runnern
          # regelmäßig ins anonyme Rate-Limit.
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" | tar xz trivy
          sudo mv trivy /usr/local/bin/
          # KSOPS-Stub: CI hat keinen age-Key, Secrets werden nicht gerendert.
          printf '#!/bin/sh\nexit 0\n' | sudo tee /usr/local/bin/ksops >/dev/null
          sudo chmod +x /usr/local/bin/ksops

      - name: Render manifests
        run: |
          set -euo pipefail
          mkdir -p rendered
          for dir in apps/overlays/main/*/ infrastructure/base/*/; do
            [ -f "$dir/kustomization.yaml" ] || continue
            name=$(echo "$dir" | tr '/' '_')
            kustomize build --enable-helm --enable-alpha-plugins --enable-exec "$dir" > "rendered/${name}.yaml"
          done

      - name: Trivy misconfiguration scan
        run: trivy config --severity HIGH,CRITICAL rendered

      - name: Trivy secret scan
        run: trivy fs --scanners secret --severity HIGH,CRITICAL .
