# Replace the age public key with yours: age-keygen -y < ~/.config/sops/age/keys.txt
creation_rules:
    # (^|/)[^/]+\.sops\... statt .*\.sops\... — sonst matcht die Regex auch
    # diese Konfigdatei selbst und `sops -e -i .sops.yaml` zerstört sie.
    - path_regex: (^|/)[^/]+\.sops\.ya?ml$
      encrypted_regex: ^(data|stringData)$
      age: age1rmm7srdkne4js7edykzgk39ltvamkps0y88xe4mxkx7gz7rmf3eqvvg4u5
