# SOPS encryption rules. All *.sops.yaml secrets MUST be encrypted before commit.
# Encrypt:  sops --encrypt --in-place path/to/secret.sops.yaml
# Decrypt:  sops --decrypt path/to/secret.sops.yaml
#
# Replace the age public key below with your real recipient(s).
# Generate a key:  age-keygen -o age.agekey   (keep the private key OUT of git)
creation_rules:
  - path_regex: .*\.sops\.ya?ml$
    encrypted_regex: "^(data|stringData)$"
    age: >-
      age1placeholderxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
