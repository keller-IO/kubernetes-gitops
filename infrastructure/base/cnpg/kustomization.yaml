apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cnpg-system
# CloudNativePG operator. Per-app Postgres Clusters live in each app's overlay.
helmCharts:
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    version: 0.23.0 # renovate: helm
    releaseName: cnpg
    namespace: cnpg-system
    valuesFile: values.yaml
    includeCRDs: true
