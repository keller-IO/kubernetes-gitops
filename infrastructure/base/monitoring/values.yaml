victoria-metrics-operator:
  enabled: true
# monitoring.coreos.com-CRDs (PodMonitor/ServiceMonitor) — cnpg und mariadb-operator
# rendern solche Ressourcen; ohne diese CRDs schlagen deren Syncs komplett fehl.
prometheus-operator-crds:
  enabled: true
vmsingle:
  spec:
    retentionPeriod: "30d"
    storage:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 20Gi
      storageClassName: ceph-rbd # CHANGE ME
alertmanager:
  enabled: true
  # TODO: wire a notification receiver (see AGENTS.md "Alertmanager → Notification needs to be done!")
  config:
    route:
      receiver: "null"
    receivers:
      - name: "null"
# Kein internes Grafana: das Haupt-Grafana (192.168.23.9) zieht VictoriaMetrics
# als Prometheus-Datasource über https://metrics.jit.services (vmsingle-ingress.yaml).
grafana:
  enabled: false
defaultDashboards:
  enabled: false # ohne internes Grafana nutzlos — Dashboards im Haupt-Grafana importieren
