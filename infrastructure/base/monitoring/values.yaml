victoria-metrics-operator:
  enabled: true
vmsingle:
  spec:
    retentionPeriod: "30d"
    storage:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 20Gi
      storageClassName: ceph-rbd # CHANGE ME
alertmanager:
  enabled: true
  # TODO: wire a notification receiver (see AGENTS.md "Alertmanager → Notification needs to be done!")
  config:
    route:
      receiver: "null"
    receivers:
      - name: "null"
grafana:
  enabled: true
  ingress:
    enabled: false # own Ingress in grafana-ingress.yaml
  adminPassword: REPLACE_ME # CHANGE ME — better: reference a SOPS secret, see PRODUCTION-READINESS.md
defaultDashboards:
  enabled: true
