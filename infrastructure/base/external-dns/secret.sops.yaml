# ENCRYPT BEFORE COMMIT:  sops --encrypt --in-place secret.sops.yaml
# ClouDNS API credentials for the ExternalDNS webhook. Use the SAME zone-scoped
# ClouDNS sub API user as cert-manager (cloudns-credentials) — it must have DNS
# record write permission. Keys are renamed to what the webhook expects.
apiVersion: v1
kind: Secret
metadata:
  name: cloudns-config
  namespace: external-dns
type: Opaque
stringData:
  CLOUDNS_AUTH_ID_TYPE: sub-auth-id # CHANGE ME to 'auth-id' if using the master account
  CLOUDNS_AUTH_ID: "REPLACE_WITH_CLOUDNS_SUB_AUTH_ID" # CHANGE ME (same value as cert-manager)
  CLOUDNS_AUTH_PASSWORD: "REPLACE_WITH_CLOUDNS_AUTH_PASSWORD" # CHANGE ME
