apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: external-dns
# ExternalDNS auto-manages DNS records for app Ingress hosts at ClouDNS.
# ClouDNS is not an in-tree provider, so it runs via the ClouDNS webhook sidecar.
helmCharts:
  - name: external-dns
    repo: https://kubernetes-sigs.github.io/external-dns/
    version: 1.21.1 # renovate: helm
    releaseName: external-dns
    namespace: external-dns
    valuesFile: values.yaml

generators:
  - ./secret-generator.yaml
