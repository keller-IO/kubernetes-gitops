apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-pg
  namespace: authentik
spec:
  instances: 1 # bump to 3 for HA in production
  storage:
    size: 5Gi
    storageClass: ceph-rbd # CHANGE ME if your RBD StorageClass differs
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-secret # uses AUTHENTIK_POSTGRESQL__PASSWORD? No — see note
  # NOTE: CNPG expects a basic-auth secret (username/password keys) for owner.
  # Create a dedicated db-secret or let CNPG generate one; align with app env. See PRODUCTION-READINESS.md.
  # Continuous backup to Ceph S3 (base backup + WAL → PITR). Schedule in backup.yaml.
  # TODO prod: in-tree barmanObjectStore deprecated in CNPG ≥1.26 → migrate to barman-cloud plugin.
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://cnpg-authentik/ # CHANGE ME (bucket must exist)
      endpointURL: https://s3.jit.services # CHANGE ME (Ceph RGW)
      s3Credentials:
        accessKeyId: { name: authentik-backup-s3, key: ACCESS_KEY_ID }
        secretAccessKey: { name: authentik-backup-s3, key: SECRET_ACCESS_KEY }
      wal: { compression: gzip }
      data: { compression: gzip }
  monitoring:
    enablePodMonitor: true
