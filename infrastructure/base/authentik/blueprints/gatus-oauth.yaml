version: 1
metadata:
  name: Homelab Gatus OIDC
  labels:
    blueprints.goauthentik.io/description: OAuth2 provider and application for Gatus
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: gatus-provider
    identifiers:
      client_id: gatus-client-id # CHANGE ME
    attrs:
      name: Provider for Gatus
      client_type: confidential
      client_id: gatus-client-id
      client_secret: placeholder-change-me # CHANGE ME
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: https://status.jit.platzhalter/authorization-code/callback # CHANGE ME
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
  - model: authentik_core.application
    identifiers:
      slug: gatus
    attrs:
      name: Gatus
      slug: gatus
      provider: !KeyOf gatus-provider
      launch_url: https://status.jit.platzhalter
      meta_launch_url: https://status.jit.platzhalter
      icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/gatus.svg
