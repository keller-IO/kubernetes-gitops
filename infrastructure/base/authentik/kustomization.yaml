apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: authentik
# Central OIDC provider. Per-app OAuth2 providers are delivered as blueprint ConfigMaps
# (see AGENTS.md "OIDC / Authentik Blueprint Onboarding" and blueprints/ below).
helmCharts:
  - name: authentik
    repo: https://charts.goauthentik.io
    version: 2024.10.4 # renovate: helm
    releaseName: authentik
    namespace: authentik
    valuesFile: values.yaml
resources:
  - secret.sops.yaml
  - postgres.yaml
  - cache.yaml
  - ingress.yaml
  - backup.yaml
configMapGenerator:
  - name: authentik-blueprints
    files:
      - blueprints/kimai-oauth.yaml
      - blueprints/paperless-oauth.yaml
      - blueprints/forgejo-oauth.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/part-of: authentik
