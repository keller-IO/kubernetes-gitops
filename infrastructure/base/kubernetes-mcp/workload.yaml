apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-mcp-sa
  namespace: kubernetes-mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp-server
  namespace: kubernetes-mcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app.kubernetes.io/name: kubernetes-mcp-server }
  template:
    metadata:
      labels: { app.kubernetes.io/name: kubernetes-mcp-server }
    spec:
      serviceAccountName: kubernetes-mcp-sa
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kubernetes-mcp-server
          # renovate: image=quay.io/containers/kubernetes_mcp_server
          image: quay.io/containers/kubernetes_mcp_server:v0.0.61
          args: ["--port", "8080", "--read-only"]
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-mcp-server
  namespace: kubernetes-mcp
spec:
  selector: { app.kubernetes.io/name: kubernetes-mcp-server }
  ports:
    - name: http
      port: 8080
      targetPort: http
