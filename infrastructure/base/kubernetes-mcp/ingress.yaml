apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubernetes-mcp-server
  namespace: kubernetes-mcp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    # HTTP Basic Auth — clients send: Authorization: Basic base64(mcp:<password>)
    nginx.org/basic-auth-secret: kubernetes-mcp-basic-auth
    nginx.org/basic-auth-realm: "Kubernetes MCP Server"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [mcp.jit.services] # CHANGE ME
      secretName: kubernetes-mcp-tls
  rules:
    - host: mcp.jit.services # CHANGE ME
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: kubernetes-mcp-server, port: { number: 8080 } } }
