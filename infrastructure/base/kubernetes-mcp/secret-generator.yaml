# KSOPS generator: decrypts the SOPS-encrypted secret at build time.
# The Argo CD repo-server runs kustomize with --enable-alpha-plugins --enable-exec
# and ksops in PATH (see infrastructure/base/argocd + Terraform argocd.tf).
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - ./secret.sops.yaml
