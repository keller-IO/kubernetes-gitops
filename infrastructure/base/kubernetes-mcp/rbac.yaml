apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-mcp-reader
  labels:
    app.kubernetes.io/name: kubernetes-mcp-server
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, events, services, configmaps, persistentvolumeclaims, endpoints, namespaces, nodes, nodes/stats, nodes/proxy]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, daemonsets, replicasets]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: [metrics.k8s.io]
    resources: [nodes, pods]
    verbs: [get, list, watch]
  - apiGroups: [argoproj.io]
    resources: [applications, applicationsets, appprojects]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-mcp-reader
  labels:
    app.kubernetes.io/name: kubernetes-mcp-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-mcp-reader
subjects:
  - kind: ServiceAccount
    name: kubernetes-mcp-sa
    namespace: kubernetes-mcp
