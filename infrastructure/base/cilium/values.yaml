# Cilium CNI for Talos. Talos manages kube-proxy replacement.
# See https://docs.cilium.io/en/stable/installation/k8s-install-helm/
ipam:
  mode: kubernetes
kubeProxyReplacement: true
# Talos: cgroup + bpf mounts handled by securityContext below.
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup
# k8sServiceHost/Port MUST be set on Talos (no kube-proxy).
k8sServiceHost: 127.0.0.1 # KubePrism — in der Talos machineconfig verifiziert (features.kubePrism, Port 7445)
k8sServicePort: 7445
# LB-IPAM/L2: LoadBalancer-IPs aus lb-ipam.yaml per ARP announcen (statt MetalLB).
l2announcements:
  enabled: true
# L2-Leases erzeugen deutlich mehr API-Traffic — Limits anheben (Cilium-Doku-Empfehlung).
k8sClientRateLimit:
  qps: 20
  burst: 40
# Agenten bei ConfigMap-Änderungen rollend neu starten, sonst greift neue Config nie.
rollOutCiliumPods: true
hubble:
  relay:
    enabled: true
  ui:
    enabled: true
operator:
  replicas: 1 # bump to 2 for HA once >1 control-plane node exists
