# LB-IPAM + L2-Announcements: vergibt LoadBalancer-IPs aus einem statischen Block
# und announced sie per ARP im LAN (kein MetalLB nötig).
# 192.168.2.240-249 liegt AUSSERHALB des dnsmasq-DHCP-Pools (192.168.2.60-190,
# dnsmasq auf 192.168.2.10) und kollidiert mit keiner statischen Reservierung.
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: default-pool
spec:
  blocks:
    - start: 192.168.2.240
      stop: 192.168.2.249
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default-l2
spec:
  loadBalancerIPs: true
