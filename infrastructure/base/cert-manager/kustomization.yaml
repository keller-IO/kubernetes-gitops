apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# BEWUSST kein globales "namespace:": Der Transformer würde das RoleBinding des
# cloudns-Webhooks (webhook-authentication-reader, MUSS in kube-system liegen)
# nach cert-manager umschreiben — dann bekommt der Webhook 403 auf die
# Authn-ConfigMap und ACME-DNS-01 steht still. Ressourcen ohne Namespace
# bekommen den App-Destination-Namespace von ArgoCD.
helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    version: v1.16.2 # renovate: helm
    releaseName: cert-manager
    namespace: cert-manager
    valuesFile: values.yaml
  # ACME DNS-01 webhook for ClouDNS (not a native cert-manager provider).
  - name: cert-manager-webhook-cloudns
    repo: https://schich.tel/helm-charts
    version: 1.2.0 # renovate: helm
    releaseName: cert-manager-webhook-cloudns
    namespace: cert-manager
    valuesFile: cloudns-webhook-values.yaml

generators:
  - ./secret-generator.yaml
