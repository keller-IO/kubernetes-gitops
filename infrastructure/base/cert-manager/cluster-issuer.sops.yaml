apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: letsencrypt-prod
spec:
    acme:
        server: https://acme-v02.api.letsencrypt.org/directory
        email: ingo.ebel@jitcreatives.de # CHANGE ME
        privateKeySecretRef:
            name: letsencrypt-prod-account
        solvers:
            - dns01:
                webhook:
                    # groupName MUST match `groupName` in cloudns-webhook-values.yaml.
                    groupName: acme.jit.services
                    solverName: cloudns
              selector:
                dnsZones:
                    - jit.services # CHANGE ME
