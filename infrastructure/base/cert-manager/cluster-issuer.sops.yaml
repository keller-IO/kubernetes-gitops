apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: letsencrypt-prod
spec:
    acme:
        email: admin@jit.services
        privateKeySecretRef:
            name: letsencrypt-prod-account
        server: https://acme-v02.api.letsencrypt.org/directory
        solvers:
            - dns01:
                webhook:
                    groupName: acme.jit.services
                    solverName: cloudns
              selector:
                dnsZones:
                    - jit.services
            - dns01:
                rfc2136:
                    nameserver: dns01.jit-creatives.de:53
                    tsigAlgorithm: HMACSHA256
                    tsigKeyName: cert-manager.
                    tsigSecretSecretRef:
                        name: rfc2136-tsig
                        key: secret
              selector:
                dnsZones:
                    - savar.de
            - http01:
                ingress:
                    ingressClassName: nginx
