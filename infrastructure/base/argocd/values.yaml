configs:
  cm:
    # Native kustomize handles BOTH helm inflation and the KSOPS exec plugin (SOPS
    # decryption). This MUST stay in sync with the Terraform bootstrap (argocd.tf),
    # otherwise ArgoCD self-management drifts from the initial install.
    kustomize.buildOptions: "--enable-helm --enable-alpha-plugins --enable-exec"
    timeout.reconciliation: 180s
  params:
    server.insecure: true # TLS terminated at NGINX Ingress
repoServer:
  # KSOPS + a matching kustomize installed into a shared volume, plus the age key
  # for SOPS decryption. Mirrors Terraform argocd.tf (secret name: argocd-sops-age).
  env:
    - name: SOPS_AGE_KEY_FILE
      value: /home/argocd/.config/sops/age/keys.txt
  initContainers:
    - name: install-ksops
      image: viaductoss/ksops:v4.5.1 # renovate: image=viaductoss/ksops
      command: ["/usr/local/bin/ksops", "install", "--with-kustomize", "/custom-tools"]
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools
  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: sops-age
      secret:
        secretName: argocd-sops-age # created by Terraform (infrastructure/tofu .../argocd.tf)
  volumeMounts:
    - mountPath: /usr/local/bin/kustomize
      name: custom-tools
      subPath: kustomize
    - mountPath: /usr/local/bin/ksops
      name: custom-tools
      subPath: ksops
    - mountPath: /home/argocd/.config/sops/age/keys.txt
      name: sops-age
      subPath: keys.txt
dex:
  enabled: false
applicationSet:
  enabled: true
notifications:
  enabled: false
