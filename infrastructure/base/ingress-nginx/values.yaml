controller:
  kind: deployment
  replicaCount: 2
  service:
    type: LoadBalancer # requires Cilium LB-IPAM or MetalLB pool — see PRODUCTION-READINESS.md
    # Cluster statt (Chart-Default) Local: der Cilium-L2-Announcer kann ein Node
    # OHNE nginx-Pod sein (nginx läuft nur auf einem Node) — mit Local würde der
    # den Traffic verwerfen (Ausfall am 22.07. nach wrk3-Rebuild). Cluster routet
    # intern zu nginx. Trade-off: Client-Source-IP wird SNAT'd.
    externalTrafficPolicy: Cluster
  config:
    # ACHTUNG: nginx-inc-Chart erwartet die Werte unter config.entries — flache
    # Keys hier werden ignoriert (ConfigMap bleibt leer, nginx nutzt Defaults).
    entries:
      proxy-protocol: "False"
      # Resolver (CoreDNS), damit nginx-inc ExternalName-Services zur Laufzeit
      # auflöst (binaergewitter -> savarcast.jit.land). Ohne -> Platzhalter-
      # Upstream 127.0.0.1:8181 -> 502.
      resolver-addresses: "10.96.0.10"
      resolver-valid: "30s"
  enableSnippets: true
  ingressClass:
    name: nginx
    setAsDefaultIngress: true
prometheus:
  create: true
