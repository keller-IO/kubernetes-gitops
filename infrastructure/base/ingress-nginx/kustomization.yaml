apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ingress-nginx
# NGINX Ingress from nginxinc (nginx.org/* annotations per AGENTS.md conventions).
helmCharts:
  - name: nginx-ingress
    repo: https://helm.nginx.com/stable
    version: 1.4.2 # renovate: helm
    releaseName: nginx-ingress
    namespace: ingress-nginx
    valuesFile: values.yaml
    includeCRDs: true # CRDs (VirtualServer etc.) liegen im crds/-Ordner des Charts
