# StorageClasses für das EXTERNE PVE-Ceph (fsid 74747628-…), provisioniert durch
# ceph-csi (infrastructure/base/ceph-csi/). Apps referenzieren: ceph-rbd, ceph-fs.
# Replace=true: provisioner/parameters sind immutable — Umstellung von den alten
# Rook-Platzhaltern erfordert Delete+Recreate durch ArgoCD.
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ceph-rbd
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
    argocd.argoproj.io/sync-options: Force=true,Replace=true
provisioner: rbd.csi.ceph.com
parameters:
  clusterID: 74747628-63a3-440d-a3f6-f4681660b858
  pool: kubernetes # dedizierter RBD-Pool, siehe docs: ceph osd pool create kubernetes
  imageFeatures: layering
  csi.storage.k8s.io/fstype: ext4
  csi.storage.k8s.io/provisioner-secret-name: csi-rbd-secret
  csi.storage.k8s.io/provisioner-secret-namespace: ceph-csi
  csi.storage.k8s.io/controller-expand-secret-name: csi-rbd-secret
  csi.storage.k8s.io/controller-expand-secret-namespace: ceph-csi
  csi.storage.k8s.io/node-stage-secret-name: csi-rbd-secret
  csi.storage.k8s.io/node-stage-secret-namespace: ceph-csi
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: Immediate
---
# HINWEIS: Der CephFS-CSI-Treiber ist noch NICHT deployt (client.kubernetes hat
# keine mds-Caps). PVCs auf ceph-fs bleiben Pending, bis ceph-csi-cephfs folgt.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ceph-fs
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
provisioner: cephfs.csi.ceph.com
parameters:
  clusterID: 74747628-63a3-440d-a3f6-f4681660b858
  fsName: cephfs
  pool: cephfs_data
  csi.storage.k8s.io/provisioner-secret-name: csi-cephfs-secret
  csi.storage.k8s.io/provisioner-secret-namespace: ceph-csi
  csi.storage.k8s.io/controller-expand-secret-name: csi-cephfs-secret
  csi.storage.k8s.io/controller-expand-secret-namespace: ceph-csi
  csi.storage.k8s.io/node-stage-secret-name: csi-cephfs-secret
  csi.storage.k8s.io/node-stage-secret-namespace: ceph-csi
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: Immediate
