# Example StorageClasses backed by an existing Ceph cluster (Rook CSI provisioners).
# Adjust clusterID / pool / fsName / provisioner to match your deployment, or delete
# if these classes already exist. App manifests reference: ceph-rbd, ceph-fs.
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ceph-rbd
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: rook-ceph.rbd.csi.ceph.com # CHANGE ME if external-ceph CSI
parameters:
  clusterID: rook-ceph # CHANGE ME
  pool: replicapool # CHANGE ME
  imageFeatures: layering
  csi.storage.k8s.io/fstype: ext4
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: Immediate
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ceph-fs
provisioner: rook-ceph.cephfs.csi.ceph.com # CHANGE ME
parameters:
  clusterID: rook-ceph # CHANGE ME
  fsName: cephfs # CHANGE ME
  pool: cephfs-data0 # CHANGE ME
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: Immediate
