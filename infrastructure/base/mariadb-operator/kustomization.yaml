apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mariadb-system
# MariaDB operator — WordPress needs MySQL/MariaDB, not Postgres.
# Per-instance MariaDB Clusters live in each WordPress overlay.
helmCharts:
  - name: mariadb-operator-crds
    repo: https://helm.mariadb.com/mariadb-operator
    version: 0.38.1 # renovate: helm
    releaseName: mariadb-operator-crds
    namespace: mariadb-system
  - name: mariadb-operator
    repo: https://helm.mariadb.com/mariadb-operator
    version: 0.38.1 # renovate: helm
    releaseName: mariadb-operator
    namespace: mariadb-system
    valuesFile: values.yaml
