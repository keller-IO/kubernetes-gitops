# Roundcube-Anpassungen aus dem Docker-Swarm (dockerswarm03): J.I.T.-Logo +
# showpassword-Plugin (Auge-Icon zum Passwort-Einblenden im Login). Die drei
# Plugin-Dateien werden per subPath nach /var/www/html/plugins/showpassword/
# gemountet, das Logo (binär) nach /var/www/html/skins/jit-logo.png.
apiVersion: v1
kind: ConfigMap
metadata:
  name: roundcube-customizations
  namespace: roundcube
data:
  showpassword.php: |
    <?php
    class showpassword extends rcube_plugin
    {
        public $task = 'login';

        function init()
        {
            // CSS und JS einbinden
            $this->include_stylesheet('style.css');
            $this->include_script('init.js');
        }
    }
  init.js: |
    document.addEventListener("DOMContentLoaded", function() {
        const pwdInput = document.getElementById('rcmloginpwd');
        if (!pwdInput) return;

        // Eltern-Container relativ positionieren
        const container = pwdInput.parentNode;
        container.style.position = 'relative'; // Icon relativ zum Input

        // Toggle-Icon erstellen
        const toggle = document.createElement('span');
        toggle.className = 'toggle-icon';
        toggle.textContent = '👁️';

        // Style für Icon
        toggle.style.position = 'absolute';
        toggle.style.right = '10px';
        toggle.style.top = '50%';
        toggle.style.transform = 'translateY(-50%)';
        toggle.style.cursor = 'pointer';
        toggle.style.userSelect = 'none';
        toggle.style.fontSize = '16px';
        toggle.style.width = '24px';
        toggle.style.height = '24px';
        toggle.style.display = 'flex';
        toggle.style.alignItems = 'center';
        toggle.style.justifyContent = 'center';
        toggle.style.borderRadius = '50%';
        toggle.style.background = '#f0f0f0';
        toggle.style.opacity = '0.6';
        toggle.style.transition = 'opacity 0.2s, background 0.2s';

        toggle.addEventListener('mouseover', () => {
            toggle.style.opacity = 1;
            toggle.style.background = '#e0e0e0';
        });
        toggle.addEventListener('mouseout', () => {
            toggle.style.opacity = 0.6;
            toggle.style.background = '#f0f0f0';
        });

        // Passwort anzeigen/ausblenden
        toggle.addEventListener('click', function() {
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                toggle.textContent = '🙈';
            } else {
                pwdInput.type = 'password';
                toggle.textContent = '👁️';
            }
        });

        container.appendChild(toggle);
    });
  style.css: |
    /* Wrapper um Input */
    .password-wrapper {
        position: relative;
        display: inline-block; /* verhindert Zeilenumbruch */
    }

    /* Toggle Icon */
    .password-wrapper .toggle-icon {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        user-select: none;
        opacity: 0.6;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        background: #f0f0f0;
        transition: opacity 0.2s, background 0.2s;
    }

    .password-wrapper .toggle-icon:hover {
        opacity: 1;
        background: #e0e0e0;
    }
binaryData:
  jit-logo.png: 
