# Manual one-shot migration helper; intentionally not listed in kustomization.yaml.
# Run only after roundcube-pg exists and while the roundcube Deployment is scaled
# to 0. The job replaces target tables.
apiVersion: batch/v1
kind: Job
metadata:
  name: roundcube-mysql-to-postgres
  namespace: roundcube
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: pgloader
          image: dimitri/pgloader:latest
          env:
            - name: ROUNDCUBE_LEGACY_MYSQL_DSN
              valueFrom: { secretKeyRef: { name: roundcube-legacy-app, key: roundcube_mysql_dsn } }
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: roundcube-db-app, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: roundcube-db-app, key: password } }
          command: ["/bin/sh", "-ec"]
          args:
            - |
              pgloader \
                --with "include drop" \
                --with "create tables" \
                --with "create indexes" \
                --with "reset sequences" \
                "$ROUNDCUBE_LEGACY_MYSQL_DSN" \
                "postgresql://$PGUSER@roundcube-pg-rw:5432/roundcube"
