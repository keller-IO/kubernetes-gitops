apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: roundcube
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: roundcube }
  template:
    metadata:
      labels: { app.kubernetes.io/name: roundcube }
    spec:
      containers:
        - name: roundcube
          # renovate: image=roundcube/roundcubemail
          image: roundcube/roundcubemail:1.6.9-apache
          ports: [{ containerPort: 80 }]
          env:
            # Ohne dies deaktiviert Composer (läuft als root) den roundcube/
            # plugin-installer -> composer-Plugins (fetchmail, contextmenu)
            # landen in vendor/, aber nie in plugins/ -> "Failed to load plugin".
            - name: COMPOSER_ALLOW_SUPERUSER
              value: "1"
            - name: ROUNDCUBEMAIL_DB_TYPE
              value: pgsql
            - name: ROUNDCUBEMAIL_DB_HOST
              value: roundcube-pg-rw
            - name: ROUNDCUBEMAIL_DB_PORT
              value: "5432"
            - name: ROUNDCUBEMAIL_DB_NAME
              value: roundcube
            - name: ROUNDCUBEMAIL_DB_USER
              valueFrom: { secretKeyRef: { name: roundcube-db-app, key: username } }
            - name: ROUNDCUBEMAIL_DB_PASSWORD
              valueFrom: { secretKeyRef: { name: roundcube-db-app, key: password } }
            - name: ROUNDCUBEMAIL_DEFAULT_HOST
              value: "tls://mail.jit-creatives.de"
            - name: ROUNDCUBEMAIL_DEFAULT_PORT
              value: "143"
            - name: ROUNDCUBEMAIL_SMTP_SERVER
              value: "tls://mail.jit-creatives.de"
            - name: ROUNDCUBEMAIL_SMTP_PORT
              value: "587"
            - name: ROUNDCUBEMAIL_PLUGINS
              value: "managesieve,virtuser_query,acl,password,archive,additional_message_headers,fetchmail,zipdownload,contextmenu,showpassword"
            - name: ROUNDCUBEMAIL_COMPOSER_PLUGINS
              value: "johndoh/contextmenu:3.3.1,pf4public/fetchmail:1.0.13"
            - name: ROUNDCUBEMAIL_SKIN
              value: elastic
            - name: ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE
              value: "25M"
            - name: ROUNDCUBEMAIL_DES_KEY
              valueFrom: { secretKeyRef: { name: roundcube-legacy-app, key: des_key } }
            - name: ROUNDCUBE_VIRTUSER_QUERY_DSN
              valueFrom: { secretKeyRef: { name: roundcube-legacy-app, key: virtuser_query_dsn } }
            - name: ROUNDCUBE_PASSWORD_DB_DSN
              valueFrom: { secretKeyRef: { name: roundcube-legacy-app, key: password_db_dsn } }
          volumeMounts:
            - name: roundcube-config
              mountPath: /var/roundcube/config
            # J.I.T.-Anpassungen aus dem Swarm (roundcube-customizations CM):
            - { name: roundcube-custom, mountPath: /var/www/html/plugins/showpassword/showpassword.php, subPath: showpassword.php }
            - { name: roundcube-custom, mountPath: /var/www/html/plugins/showpassword/init.js, subPath: init.js }
            - { name: roundcube-custom, mountPath: /var/www/html/plugins/showpassword/style.css, subPath: style.css }
            - { name: roundcube-custom, mountPath: /var/www/html/skins/jit-logo.png, subPath: jit-logo.png }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 256Mi }
      volumes:
        - name: roundcube-config
          configMap:
            name: roundcube-config
        - name: roundcube-custom
          configMap:
            name: roundcube-customizations
---
apiVersion: v1
kind: Service
metadata:
  name: roundcube
  namespace: roundcube
spec:
  selector: { app.kubernetes.io/name: roundcube }
  ports: [{ name: http, port: 80, targetPort: 80 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roundcube
  namespace: roundcube
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    nginx.org/client-max-body-size: "25m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [webmail.jit.services] # CHANGE ME
      secretName: roundcube-tls
  rules:
    - host: webmail.jit.services # CHANGE ME
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: roundcube, port: { number: 80 } } }
