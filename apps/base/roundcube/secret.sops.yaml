# ENCRYPT BEFORE COMMIT:  sops --encrypt --in-place secret.sops.yaml
# basic-auth secret consumed by CNPG (initdb owner) AND the app Deployment.
apiVersion: v1
kind: Secret
metadata:
  name: roundcube-db-app
  namespace: roundcube
type: kubernetes.io/basic-auth
stringData:
  username: roundcube
  password: REPLACE_ME
---
# Ceph S3 credentials for CNPG barman backups
apiVersion: v1
kind: Secret
metadata:
  name: roundcube-backup-s3
  namespace: roundcube
type: Opaque
stringData:
  ACCESS_KEY_ID: REPLACE_ME
  SECRET_ACCESS_KEY: REPLACE_ME
