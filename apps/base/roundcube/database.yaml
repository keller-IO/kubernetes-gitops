apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: roundcube-pg
  namespace: roundcube
spec:
  instances: 1 # 3 for HA
  storage:
    size: 5Gi # 12.07.: 2Gi durch WAL-Stau vollgelaufen — Puffer
    storageClass: ceph-rbd # CNPG-Feld heißt storageClass (nicht storageClassName)
  bootstrap:
    initdb:
      database: roundcube
      owner: roundcube
      secret:
        name: roundcube-db-app # basic-auth secret (username/password) — see secret.sops.yaml
  # Backup (barmanObjectStore) DEAKTIVIERT bis ein EXTERNES S3-Ziel existiert
  # (nicht dasselbe Ceph!). Kaputtes Archive-Target = WAL-Stau = Disk voll
  # (so fiel roundcube-pg am 12.07. aus). backup.yaml ebenfalls deaktiviert.
  monitoring:
    enablePodMonitor: true
