apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: roundcube-pg
  namespace: roundcube
spec:
  instances: 1 # 3 for HA
  storage:
    size: 2Gi
    storageClass: ceph-rbd # CNPG-Feld heißt storageClass (nicht storageClassName)
  bootstrap:
    initdb:
      database: roundcube
      owner: roundcube
      secret:
        name: roundcube-db-app # basic-auth secret (username/password) — see secret.sops.yaml
  # Continuous backup to Ceph S3 (base backup + WAL → PITR). Schedule in backup.yaml.
  # TODO prod: in-tree barmanObjectStore deprecated in CNPG ≥1.26 → migrate to barman-cloud plugin.
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://cnpg-roundcube/ # CHANGE ME (bucket must exist — provision via OBC/RGW)
      endpointURL: https://s3.jit.services # CHANGE ME (Ceph RGW)
      s3Credentials:
        accessKeyId: { name: roundcube-backup-s3, key: ACCESS_KEY_ID }
        secretAccessKey: { name: roundcube-backup-s3, key: SECRET_ACCESS_KEY }
      wal: { compression: gzip }
      data: { compression: gzip }
  monitoring:
    enablePodMonitor: true
