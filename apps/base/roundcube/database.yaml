apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: roundcube-pg
  namespace: roundcube
spec:
  instances: 1 # 3 for HA
  storage:
    size: 5Gi # 12.07.: 2Gi durch WAL-Stau vollgelaufen — Puffer
    storageClass: ceph-rbd # CNPG-Feld heißt storageClass (nicht storageClassName)
  bootstrap:
    initdb:
      database: roundcube
      owner: roundcube
      secret:
        name: roundcube-db-app # basic-auth secret (username/password) — see secret.sops.yaml
  # Kontinuierliches Backup nach Garage-S3 (192.168.23.21, Bucket backups).
  # WICHTIG: erst reaktiviert, seit das externe S3 existiert (13.07.) — ein
  # kaputtes Archive-Target würde WALs stauen bis die Disk voll ist.
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://backups/cnpg-roundcube/
      endpointURL: http://192.168.23.21:3900
      s3Credentials:
        accessKeyId: { name: roundcube-backup-s3, key: ACCESS_KEY_ID }
        secretAccessKey: { name: roundcube-backup-s3, key: SECRET_ACCESS_KEY }
        region: { name: roundcube-backup-s3, key: region } # Garage erzwingt Region-Match bei HeadBucket
      wal: { compression: gzip }
      data: { compression: gzip }
  monitoring:
    enablePodMonitor: true
