# Gatus — automated service health dashboard.
resources:
  requests: { cpu: 50m, memory: 32Mi }
  limits: { memory: 64Mi }

# Inject the OIDC client secret; gatus expands ${...} in config at runtime.
envFrom:
  - secretRef:
      name: gatus-oidc

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
  hosts:
    - status.jit.services # CHANGE ME
  tls:
    - secretName: gatus-tls
      hosts:
        - status.jit.services # CHANGE ME

config:
  # Protect the dashboard with Authentik OIDC. Callback path is fixed by gatus.
  security:
    oidc:
      issuer-url: https://auth.jit.services/application/o/gatus/ # CHANGE ME
      redirect-url: https://status.jit.services/authorization-code/callback # CHANGE ME
      client-id: gatus-client-id # CHANGE ME (must match Authentik blueprint)
      client-secret: ${OIDC_CLIENT_SECRET} # from gatus-oidc secret
      scopes: [openid, profile, email]
  ui:
    title: Homelab Status
  # Sample probes — replace with the real internal endpoints to watch.
  endpoints:
    - name: argocd
      url: https://argocd.jit.services # CHANGE ME
      interval: 60s
      conditions:
        - "[STATUS] == 200"
    - name: authentik
      url: https://auth.jit.services # CHANGE ME
      interval: 60s
      conditions:
        - "[STATUS] == 200"
