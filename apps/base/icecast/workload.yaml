apiVersion: apps/v1
kind: Deployment
metadata:
  name: icecast
  namespace: icecast
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: icecast }
  template:
    metadata:
      labels: { app.kubernetes.io/name: icecast }
    spec:
      containers:
        - name: icecast
          # renovate: image=infiniteproject/icecast
          image: infiniteproject/icecast:latest@sha256:cd506cf3dfe31ce05fd37d7e672dbd1213e7255cc93d28ecf5a3b547af4e162c
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: icecast-secret
          env:
            - name: ICECAST_HOSTNAME
              value: radio.jit.services # CHANGE ME
            - name: ICECAST_LOCATION
              value: Homelab # CHANGE ME
            - name: ICECAST_MAX_CLIENTS
              value: "100"
            - name: ICECAST_MAX_SOURCES
              value: "4"
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 256Mi }
          readinessProbe:
            httpGet:
              path: /status.xsl
              port: http
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /status.xsl
              port: http
            initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: icecast
  namespace: icecast
spec:
  selector: { app.kubernetes.io/name: icecast }
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: icecast
  namespace: icecast
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [radio.jit.services] # CHANGE ME
      secretName: icecast-tls
  rules:
    - host: radio.jit.services # CHANGE ME
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: icecast, port: { number: 8000 } } }
