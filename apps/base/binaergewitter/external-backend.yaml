# binaergewitter läuft NICHT im Cluster — die Backends liegen auf savarcast
# (savarcast.jit.land = 192.168.2.66). Der Cluster proxied nur (wie vorher der
# .15-Traefik). ExternalName-Service statt Service+EndpointSlice, weil ArgoCD
# EndpointSlice/Endpoints per Default aus dem Sync ausschließt (resource.exclusions).
# CoreDNS löst savarcast.jit.land clusterintern auf.
---
apiVersion: v1
kind: Service
metadata:
  name: savarcast-web
  namespace: binaergewitter
spec:
  type: ExternalName
  externalName: savarcast.jit.land
  ports:
    - name: http
      port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: savarcast-etherpad
  namespace: binaergewitter
spec:
  type: ExternalName
  externalName: savarcast.jit.land
  ports:
    - name: http
      port: 9001
