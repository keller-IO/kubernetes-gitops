# binaergewitter läuft NICHT im Cluster — Backends auf savarcast (192.168.2.66).
# Selector-loser Service + manuelle EndpointSlice (Verweis auf die externe IP).
#
# WICHTIG: ArgoCD schließt EndpointSlice/Endpoints per Default aus dem Sync UND
# Prune aus (resource.exclusions). Die Slices unten werden NICHT von ArgoCD
# angewendet — sie müssen EINMALIG manuell appliziert werden (bleiben dann
# stehen, ArgoCD löscht sie nicht):
#   kubectl apply -f apps/base/binaergewitter/external-backend.yaml
# (ExternalName-Service ginge nicht: nginx-inc setzt dafür den Platzhalter-
#  Upstream 127.0.0.1:8181 -> 502.)
---
apiVersion: v1
kind: Service
metadata:
  name: savarcast-web
  namespace: binaergewitter
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: savarcast-web
  namespace: binaergewitter
  labels:
    kubernetes.io/service-name: savarcast-web
addressType: IPv4
ports:
  - name: http
    port: 80
endpoints:
  - addresses: ["192.168.2.66"]
    conditions:
      ready: true
---
apiVersion: v1
kind: Service
metadata:
  name: savarcast-etherpad
  namespace: binaergewitter
spec:
  ports:
    - name: http
      port: 9001
      targetPort: 9001
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: savarcast-etherpad
  namespace: binaergewitter
  labels:
    kubernetes.io/service-name: savarcast-etherpad
addressType: IPv4
ports:
  - name: http
    port: 9001
endpoints:
  - addresses: ["192.168.2.66"]
    conditions:
      ready: true
