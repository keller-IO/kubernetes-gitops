apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailman-core
  namespace: mailman
spec:
  replicas: 1 # do not scale: Mailman core must not share /opt/mailman across processes
  strategy:
    type: Recreate
  selector:
    matchLabels: { app.kubernetes.io/name: mailman-core }
  template:
    metadata:
      labels: { app.kubernetes.io/name: mailman-core }
    spec:
      containers:
        - name: mailman-core
          # renovate: image=maxking/mailman-core
          image: maxking/mailman-core:0.5.2
          ports:
            - name: api
              containerPort: 8001
            - name: lmtp
              containerPort: 8024
          env:
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: mailman-db-app, key: password } }
            - name: DATABASE_URL
              value: postgresql://mailman:$(DB_PASSWORD)@mailman-pg-rw:5432/mailmandb
            - name: DATABASE_TYPE
              value: postgres
            - name: DATABASE_CLASS
              value: mailman.database.postgresql.PostgreSQLDatabase
            # LMTP/REST an alle Interfaces binden. NICHT den Service-Namen nehmen:
            # der löst in k8s auf die (nicht bindbare) ClusterIP auf -> core crasht
            # mit "could not bind on 8024". Erreichbarkeit läuft über die Services
            # (mailman-core:8001 REST, mailman-lmtp:8024 LoadBalancer).
            - name: MM_HOSTNAME
              value: 0.0.0.0
            - name: MAILMAN_REST_PORT
              value: "8001"
            - name: MAILMAN_REST_USER
              valueFrom: { secretKeyRef: { name: mailman-secret, key: MAILMAN_REST_USER } }
            - name: MAILMAN_REST_PASSWORD
              valueFrom: { secretKeyRef: { name: mailman-secret, key: MAILMAN_REST_PASSWORD } }
            - name: HYPERKITTY_API_KEY
              valueFrom: { secretKeyRef: { name: mailman-secret, key: HYPERKITTY_API_KEY } }
            - name: HYPERKITTY_URL
              value: http://mailman-web:8000/hyperkitty
            - name: MTA
              value: postfix
            # Outbound wie im Alt-Setup: mx02 relayt IP-basiert (mynetworks),
            # kein Auth/TLS auf dem internen Hop.
            - name: SMTP_HOST
              value: 192.168.2.209 # mx02.jitcreatives.de
            - name: SMTP_PORT
              value: "25"
            - name: DEFAULT_FROM_EMAIL
              value: postmaster@lists.jitmail.de
            - name: SERVER_EMAIL
              value: postmaster@lists.jitmail.de
          resources:
            requests: { cpu: 150m, memory: 512Mi }
            limits: { memory: 1536Mi } # 768Mi war zu knapp -> OOMKilled beim Start (13.07.)
          volumeMounts:
            - name: core-data
              mountPath: /opt/mailman
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 20
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 60
      volumes:
        - name: core-data
          persistentVolumeClaim:
            claimName: mailman-core-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailman-web
  namespace: mailman
spec:
  replicas: 1 # web data includes static files, logs and diskcache
  strategy:
    type: Recreate
  selector:
    matchLabels: { app.kubernetes.io/name: mailman-web }
  template:
    metadata:
      labels: { app.kubernetes.io/name: mailman-web }
    spec:
      containers:
        - name: mailman-web
          # renovate: image=maxking/mailman-web
          image: maxking/mailman-web:0.5.2
          ports:
            - name: http
              containerPort: 8000
            - name: uwsgi
              containerPort: 8080
          env:
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: mailman-db-app, key: password } }
            - name: DATABASE_URL
              value: postgresql://mailman:$(DB_PASSWORD)@mailman-pg-rw:5432/mailmandb
            - name: DATABASE_TYPE
              value: postgres
            - name: SERVE_FROM_DOMAIN
              value: lists.jitmail.de
            - name: DJANGO_ALLOWED_HOSTS
              value: lists.jitmail.de,lists.jit.services,localhost,127.0.0.1
            - name: MAILMAN_REST_URL
              value: http://mailman-core:8001
            - name: MAILMAN_REST_USER
              valueFrom: { secretKeyRef: { name: mailman-secret, key: MAILMAN_REST_USER } }
            - name: MAILMAN_REST_PASSWORD
              valueFrom: { secretKeyRef: { name: mailman-secret, key: MAILMAN_REST_PASSWORD } }
            - name: MAILMAN_HOSTNAME
              value: mailman-core
            - name: POSTORIUS_TEMPLATE_BASE_URL
              value: http://mailman-web:8000
            - name: HYPERKITTY_API_KEY
              valueFrom: { secretKeyRef: { name: mailman-secret, key: HYPERKITTY_API_KEY } }
            - name: SECRET_KEY
              valueFrom: { secretKeyRef: { name: mailman-secret, key: SECRET_KEY } }
            - name: MAILMAN_ADMIN_USER
              valueFrom: { secretKeyRef: { name: mailman-secret, key: MAILMAN_ADMIN_USER } }
            - name: MAILMAN_ADMIN_EMAIL
              valueFrom: { secretKeyRef: { name: mailman-secret, key: MAILMAN_ADMIN_EMAIL } }
            - name: SMTP_HOST
              value: 192.168.2.209 # mx02.jitcreatives.de (IP-basiertes Relay via mynetworks)
            - name: SMTP_PORT
              value: "25"
            - name: SMTP_USE_TLS
              value: "False"
            - name: UWSGI_STATIC_MAP
              value: /static=/opt/mailman-web-data/static
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits: { memory: 1536Mi } # Django-Migrations/collectstatic spiken beim Start
          volumeMounts:
            - name: web-data
              mountPath: /opt/mailman-web-data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
      volumes:
        - name: web-data
          persistentVolumeClaim:
            claimName: mailman-web-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailman-core-data
  namespace: mailman
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ceph-rbd # CHANGE ME
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailman-web-data
  namespace: mailman
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ceph-rbd # CHANGE ME
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mailman-core
  namespace: mailman
spec:
  selector: { app.kubernetes.io/name: mailman-core }
  ports:
    - name: api
      port: 8001
      targetPort: api
    - name: lmtp
      port: 8024
      targetPort: lmtp
---
# LMTP-Eingang für die externen Annahme-MTAs (mail04/mail05/.15-Postfix):
# feste LB-IP aus dem Cilium-Pool, Transport dort = lmtp:[192.168.2.247]:8024
apiVersion: v1
kind: Service
metadata:
  name: mailman-lmtp
  namespace: mailman
  annotations:
    lbipam.cilium.io/ips: 192.168.2.247
spec:
  type: LoadBalancer
  selector: { app.kubernetes.io/name: mailman-core }
  ports:
    - name: lmtp
      port: 8024
      targetPort: lmtp
---
apiVersion: v1
kind: Service
metadata:
  name: mailman-web
  namespace: mailman
spec:
  selector: { app.kubernetes.io/name: mailman-web }
  ports:
    - name: http
      port: 8000
      targetPort: http
    - name: uwsgi
      port: 8080
      targetPort: uwsgi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mailman
  namespace: mailman
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    nginx.org/client-max-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [lists.jit.services] # CHANGE ME
      secretName: mailman-tls
  rules:
    - host: lists.jit.services # CHANGE ME
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: mailman-web, port: { number: 8000 } } }
