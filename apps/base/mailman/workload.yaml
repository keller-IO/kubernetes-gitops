apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailman-core
  namespace: mailman
spec:
  replicas: 1 # do not scale: Mailman core must not share /opt/mailman across processes
  strategy:
    type: Recreate
  selector:
    matchLabels: { app.kubernetes.io/name: mailman-core }
  template:
    metadata:
      labels: { app.kubernetes.io/name: mailman-core }
    spec:
      containers:
        - name: mailman-core
          # renovate: image=maxking/mailman-core
          image: maxking/mailman-core:0.5.2
          ports:
            - name: api
              containerPort: 8001
            - name: lmtp
              containerPort: 8024
          env:
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: mailman-db-app, key: password } }
            - name: DATABASE_URL
              value: postgresql://mailman:$(DB_PASSWORD)@mailman-pg-rw:5432/mailmandb
            - name: DATABASE_TYPE
              value: postgres
            - name: DATABASE_CLASS
              value: mailman.database.postgresql.PostgreSQLDatabase
            - name: MM_HOSTNAME
              value: mailman-core
            - name: MAILMAN_REST_PORT
              value: "8001"
            - name: MAILMAN_REST_USER
              valueFrom: { secretKeyRef: { name: mailman-secret, key: MAILMAN_REST_USER } }
            - name: MAILMAN_REST_PASSWORD
              valueFrom: { secretKeyRef: { name: mailman-secret, key: MAILMAN_REST_PASSWORD } }
            - name: HYPERKITTY_API_KEY
              valueFrom: { secretKeyRef: { name: mailman-secret, key: HYPERKITTY_API_KEY } }
            - name: HYPERKITTY_URL
              value: http://mailman-web:8000/hyperkitty
            - name: MTA
              value: postfix
            - name: SMTP_HOST
              value: smtp.jit.platzhalter # CHANGE ME
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_SECURE_MODE
              value: starttls
            - name: SMTP_HOST_USER
              valueFrom: { secretKeyRef: { name: mailman-secret, key: SMTP_HOST_USER } }
            - name: SMTP_HOST_PASSWORD
              valueFrom: { secretKeyRef: { name: mailman-secret, key: SMTP_HOST_PASSWORD } }
          resources:
            requests: { cpu: 150m, memory: 256Mi }
            limits: { memory: 768Mi }
          volumeMounts:
            - name: core-data
              mountPath: /opt/mailman
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 20
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 60
      volumes:
        - name: core-data
          persistentVolumeClaim:
            claimName: mailman-core-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailman-web
  namespace: mailman
spec:
  replicas: 1 # web data includes static files, logs and diskcache
  strategy:
    type: Recreate
  selector:
    matchLabels: { app.kubernetes.io/name: mailman-web }
  template:
    metadata:
      labels: { app.kubernetes.io/name: mailman-web }
    spec:
      containers:
        - name: mailman-web
          # renovate: image=maxking/mailman-web
          image: maxking/mailman-web:0.5.2
          ports:
            - name: http
              containerPort: 8000
            - name: uwsgi
              containerPort: 8080
          env:
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: mailman-db-app, key: password } }
            - name: DATABASE_URL
              value: postgresql://mailman:$(DB_PASSWORD)@mailman-pg-rw:5432/mailmandb
            - name: DATABASE_TYPE
              value: postgres
            - name: SERVE_FROM_DOMAIN
              value: lists.jit.platzhalter # CHANGE ME
            - name: DJANGO_ALLOWED_HOSTS
              value: lists.jit.platzhalter,localhost,127.0.0.1 # CHANGE ME
            - name: MAILMAN_REST_URL
              value: http://mailman-core:8001
            - name: MAILMAN_REST_USER
              valueFrom: { secretKeyRef: { name: mailman-secret, key: MAILMAN_REST_USER } }
            - name: MAILMAN_REST_PASSWORD
              valueFrom: { secretKeyRef: { name: mailman-secret, key: MAILMAN_REST_PASSWORD } }
            - name: MAILMAN_HOSTNAME
              value: mailman-core
            - name: POSTORIUS_TEMPLATE_BASE_URL
              value: http://mailman-web:8000
            - name: HYPERKITTY_API_KEY
              valueFrom: { secretKeyRef: { name: mailman-secret, key: HYPERKITTY_API_KEY } }
            - name: SECRET_KEY
              valueFrom: { secretKeyRef: { name: mailman-secret, key: SECRET_KEY } }
            - name: MAILMAN_ADMIN_USER
              valueFrom: { secretKeyRef: { name: mailman-secret, key: MAILMAN_ADMIN_USER } }
            - name: MAILMAN_ADMIN_EMAIL
              valueFrom: { secretKeyRef: { name: mailman-secret, key: MAILMAN_ADMIN_EMAIL } }
            - name: SMTP_HOST
              value: smtp.jit.platzhalter # CHANGE ME
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_HOST_USER
              valueFrom: { secretKeyRef: { name: mailman-secret, key: SMTP_HOST_USER } }
            - name: SMTP_HOST_PASSWORD
              valueFrom: { secretKeyRef: { name: mailman-secret, key: SMTP_HOST_PASSWORD } }
            - name: SMTP_USE_TLS
              value: "True"
            - name: UWSGI_STATIC_MAP
              value: /static=/opt/mailman-web-data/static
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits: { memory: 1Gi }
          volumeMounts:
            - name: web-data
              mountPath: /opt/mailman-web-data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
      volumes:
        - name: web-data
          persistentVolumeClaim:
            claimName: mailman-web-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailman-core-data
  namespace: mailman
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ceph-rbd # CHANGE ME
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailman-web-data
  namespace: mailman
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ceph-rbd # CHANGE ME
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mailman-core
  namespace: mailman
spec:
  selector: { app.kubernetes.io/name: mailman-core }
  ports:
    - name: api
      port: 8001
      targetPort: api
    - name: lmtp
      port: 8024
      targetPort: lmtp
---
apiVersion: v1
kind: Service
metadata:
  name: mailman-web
  namespace: mailman
spec:
  selector: { app.kubernetes.io/name: mailman-web }
  ports:
    - name: http
      port: 8000
      targetPort: http
    - name: uwsgi
      port: 8080
      targetPort: uwsgi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mailman
  namespace: mailman
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    nginx.org/client-max-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [lists.jit.platzhalter] # CHANGE ME
      secretName: mailman-tls
  rules:
    - host: lists.jit.platzhalter # CHANGE ME
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: mailman-web, port: { number: 8000 } } }
