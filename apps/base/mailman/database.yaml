apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mailman-pg
  namespace: mailman
spec:
  instances: 1 # 3 for HA
  # PG 16 wie das Alt-System: der psql im maxking-Image (PG16-Client) bricht
  # an PG-17-Servern (\l nutzt daticulocale, in 17 umbenannt) — und der
  # pg_dump-Import kommt ebenfalls aus einer 16er.
  # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/postgresql
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6
  storage:
    size: 10Gi
    storageClass: ceph-rbd # CNPG-Feld heißt storageClass (nicht storageClassName)
  bootstrap:
    initdb:
      database: mailmandb
      owner: mailman
      secret:
        name: mailman-db-app
  # Backup (barmanObjectStore) DEAKTIVIERT bis ein EXTERNES S3-Ziel existiert
  # (nicht dasselbe Ceph!). Kaputtes Archive-Target = WAL-Stau = Disk voll
  # (so fiel roundcube-pg am 12.07. aus). backup.yaml ebenfalls deaktiviert.
  monitoring:
    enablePodMonitor: true
