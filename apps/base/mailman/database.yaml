apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mailman-pg
  namespace: mailman
spec:
  instances: 1 # 3 for HA
  storage:
    size: 10Gi
    storageClassName: ceph-rbd # CHANGE ME
  bootstrap:
    initdb:
      database: mailmandb
      owner: mailman
      secret:
        name: mailman-db-app
  # Continuous backup to Ceph S3 (base backup + WAL -> PITR). Schedule in backup.yaml.
  # TODO prod: in-tree barmanObjectStore deprecated in CNPG >=1.26 -> migrate to barman-cloud plugin.
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://cnpg-mailman/ # CHANGE ME (bucket must exist)
      endpointURL: https://s3.jit.platzhalter # CHANGE ME (Ceph RGW)
      s3Credentials:
        accessKeyId: { name: mailman-backup-s3, key: ACCESS_KEY_ID }
        secretAccessKey: { name: mailman-backup-s3, key: SECRET_ACCESS_KEY }
      wal: { compression: gzip }
      data: { compression: gzip }
  monitoring:
    enablePodMonitor: true
