apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mailman-pg
  namespace: mailman
spec:
  instances: 1 # 3 for HA
  # PG 16 wie das Alt-System: der psql im maxking-Image (PG16-Client) bricht
  # an PG-17-Servern (\l nutzt daticulocale, in 17 umbenannt) — und der
  # pg_dump-Import kommt ebenfalls aus einer 16er.
  # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/postgresql
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6
  storage:
    size: 10Gi
    storageClass: ceph-rbd # CNPG-Feld heißt storageClass (nicht storageClassName)
  bootstrap:
    initdb:
      database: mailmandb
      owner: mailman
      secret:
        name: mailman-db-app
  # Kontinuierliches Backup nach Garage-S3 (192.168.23.21, Bucket backups).
  # WICHTIG: erst reaktiviert, seit das externe S3 existiert (13.07.) — ein
  # kaputtes Archive-Target würde WALs stauen bis die Disk voll ist.
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://backups/cnpg-mailman/
      endpointURL: http://192.168.23.21:3900
      s3Credentials:
        accessKeyId: { name: mailman-backup-s3, key: ACCESS_KEY_ID }
        secretAccessKey: { name: mailman-backup-s3, key: SECRET_ACCESS_KEY }
        region: { name: mailman-backup-s3, key: region } # Garage erzwingt Region-Match bei HeadBucket
      wal: { compression: gzip }
      data: { compression: gzip }
  monitoring:
    enablePodMonitor: true
