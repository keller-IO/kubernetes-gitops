# ENCRYPT BEFORE COMMIT:  sops --encrypt --in-place secret.sops.yaml
# Generate core secrets with:  docker run --rm ghcr.io/mastodon/mastodon bundle exec rake secret  (x2)
# VAPID keys:  ... rake mastodon:webpush:generate_vapid_key
---
# Key names match the chart's secrets.existingSecretKeys defaults.
# Mastodon 4.3+ uses Active-Record-Encryption keys (are-*) instead of OTP_SECRET.
apiVersion: v1
kind: Secret
metadata:
  name: mastodon-secret
  namespace: mastodon
type: Opaque
stringData:
  secret-key-base: REPLACE_ME
  vapid-private-key: REPLACE_ME
  vapid-public-key: REPLACE_ME
  are-primary-key: REPLACE_ME
  are-deterministic-key: REPLACE_ME
  are-derivation-salt: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: mastodon-db-app
  namespace: mastodon
type: kubernetes.io/basic-auth
stringData:
  username: mastodon
  password: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: mastodon-smtp
  namespace: mastodon
type: Opaque
stringData:
  username: REPLACE_ME
  password: REPLACE_ME
---
# Redis/Valkey auth — shared by the Valkey StatefulSet (requirepass) and the app.
apiVersion: v1
kind: Secret
metadata:
  name: mastodon-redis
  namespace: mastodon
type: Opaque
stringData:
  password: REPLACE_ME
---
# Fallback S3 secret if you do NOT use the OBC-generated one. Otherwise point values.s3
# existing_secret at the OBC secret instead and delete this.
apiVersion: v1
kind: Secret
metadata:
  name: mastodon-s3
  namespace: mastodon
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: REPLACE_ME
  AWS_SECRET_ACCESS_KEY: REPLACE_ME
---
# Ceph S3 credentials for CNPG barman backups (separate from media bucket above)
apiVersion: v1
kind: Secret
metadata:
  name: mastodon-backup-s3
  namespace: mastodon
type: Opaque
stringData:
  ACCESS_KEY_ID: REPLACE_ME
  SECRET_ACCESS_KEY: REPLACE_ME
