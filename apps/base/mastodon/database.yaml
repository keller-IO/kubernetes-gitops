apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mastodon-pg
  namespace: mastodon
spec:
  instances: 1 # 3 for HA
  storage:
    size: 10Gi
    storageClass: ceph-rbd # CNPG-Feld heißt storageClass (nicht storageClassName)
  bootstrap:
    initdb:
      database: mastodon
      owner: mastodon
      secret:
        name: mastodon-db-app
  # Kontinuierliches Backup nach Garage-S3 (192.168.23.21, Bucket backups).
  # WICHTIG: erst reaktiviert, seit das externe S3 existiert (13.07.) — ein
  # kaputtes Archive-Target würde WALs stauen bis die Disk voll ist.
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://backups/cnpg-mastodon/
      endpointURL: http://192.168.23.21:3900
      s3Credentials:
        accessKeyId: { name: mastodon-backup-s3, key: ACCESS_KEY_ID }
        secretAccessKey: { name: mastodon-backup-s3, key: SECRET_ACCESS_KEY }
      wal: { compression: gzip }
      data: { compression: gzip }
  monitoring:
    enablePodMonitor: true
