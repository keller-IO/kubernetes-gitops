apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mastodon
# Official mastodon chart (mastodon/helm-charts). Postgres=CNPG, Redis=Valkey, media=Ceph S3.
helmCharts:
  - name: mastodon
    repo: https://mastodon.github.io/helm-charts
    version: 0.5.1 # renovate: helm  (official chart; appVersion = Mastodon release)
    releaseName: mastodon
    namespace: mastodon
    valuesFile: values.yaml
resources:
  - database.yaml
  - cache.yaml
  - objectbucket.yaml
  - secret.sops.yaml
  - backup.yaml
