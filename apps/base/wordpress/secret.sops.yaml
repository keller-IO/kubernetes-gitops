# ENCRYPT BEFORE COMMIT:  sops --encrypt --in-place secret.sops.yaml
# Per-instance secret. Same names in each namespace (wordpress-1/2/3) — no collision.
---
apiVersion: v1
kind: Secret
metadata:
  name: wordpress-db
type: Opaque
stringData:
  mariadb-root-password: REPLACE_ME
  mariadb-password: REPLACE_ME
  # Bitnami externalDatabase.existingSecret expects key 'db-password':
  db-password: REPLACE_ME # must equal mariadb-password
---
apiVersion: v1
kind: Secret
metadata:
  name: wordpress-admin
type: Opaque
stringData:
  wordpress-password: REPLACE_ME
---
# Ceph S3 credentials for mariadb-operator Backup (per-instance, name set in overlay namespace)
apiVersion: v1
kind: Secret
metadata:
  name: wordpress-backup-s3
type: Opaque
stringData:
  ACCESS_KEY_ID: REPLACE_ME
  SECRET_ACCESS_KEY: REPLACE_ME
