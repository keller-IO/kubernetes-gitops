# Host wird pro Instanz vom Overlay gepatcht (rules/0/host + tls/0/hosts/0).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wordpress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    nginx.org/client-max-body-size: "64m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [site1.jit.services]
      secretName: wordpress-tls
  rules:
    - host: site1.jit.services
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wordpress
                port:
                  number: 80
