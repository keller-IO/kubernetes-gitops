apiVersion: k8s.mariadb.com/v1alpha1
kind: Backup
metadata:
  name: wordpress-mariadb
spec:
  mariaDbRef:
    name: wordpress-mariadb
  schedule:
    cron: "0 2 * * *" # täglich 02:00 (5-Feld-Cron)
  maxRetention: 720h # 30d
  compression: gzip
  # Logischer Dump (mariadb-dump) nach Garage-S3 (192.168.23.21).
  # WICHTIG: prefix wird PRO Instanz im Overlay gepatcht (mariadb-wordpress-1/2/3),
  # sonst schreiben alle 3 in denselben S3-Ordner und die Dumps mischen sich.
  storage:
    s3:
      bucket: backups
      prefix: mariadb-wordpress-CHANGEME # Overlay MUSS patchen
      endpoint: 192.168.23.21:3900 # Garage, ohne Schema
      region: garage-potsdam
      accessKeyIdSecretKeyRef: { name: wordpress-backup-s3, key: ACCESS_KEY_ID }
      secretAccessKeySecretKeyRef: { name: wordpress-backup-s3, key: SECRET_ACCESS_KEY }
      tls:
        enabled: false # Garage spricht HTTP, kein TLS
