apiVersion: k8s.mariadb.com/v1alpha1
kind: Backup
metadata:
  name: wordpress-mariadb
spec:
  mariaDbRef:
    name: wordpress-mariadb
  schedule:
    cron: "0 2 * * *" # daily 02:00 (5-field cron)
  maxRetention: 720h # 30d
  # Logical dump (mariadb-dump). TODO prod: for PITR use the PhysicalBackup CRD + binlog.
  # Per-instance: identical name is safe across wordpress-1/2/3 namespaces.
  storage:
    s3:
      bucket: mariadb-wordpress # CHANGE ME (per instance: distinct bucket/prefix recommended)
      endpoint: s3.jit.platzhalter # CHANGE ME (Ceph RGW, no scheme)
      region: default
      accessKeyIdSecretKeyRef: { name: wordpress-backup-s3, key: ACCESS_KEY_ID }
      secretAccessKeySecretKeyRef: { name: wordpress-backup-s3, key: SECRET_ACCESS_KEY }
      tls:
        enabled: true
