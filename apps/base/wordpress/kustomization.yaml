apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Shared WordPress base. Each instance runs in its OWN namespace (wordpress-1/2/3),
# so identical resource names across instances never collide. Overlays patch only
# the Ingress host. Offizielles WordPress-Image statt Bitnami-Chart (Katalog tot).
# WordPress requires MariaDB → per-instance MariaDB CR (mariadb-operator).
resources:
  - deployment.yaml
  - ingress.yaml
  - database.yaml
  - cache.yaml
  - backup.yaml
  - hardening.yaml

generators:
  - ./secret-generator.yaml
