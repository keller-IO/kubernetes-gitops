apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jitcloud
  namespace: legacy-proxy
  annotations:
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "false"
    # Backend spricht selbst HTTPS (.217:443) -> re-encrypt zum Upstream
