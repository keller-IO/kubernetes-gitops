---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: horads
  namespace: legacy-proxy
  annotations:
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "false"
    # Icecast-Stream: Buffering aus + lange Timeouts (Dauer-Verbindung). Als
    # nginx-inc-Annotations statt Snippet (Snippet dupliziert proxy_read_timeout
    # -> nginx-Reload scheitert [emerg]).
    nginx.org/proxy-buffering: "false"
    nginx.org/proxy-read-timeout: "3600s"
    nginx.org/proxy-send-timeout: "3600s"
spec:
  ingressClassName: nginx
  rules:
    - host: stream.horads.de
      http:
        paths: [{ path: /, pathType: Prefix, backend: { service: { name: horads, port: { number: 8080 } } } }]
---
