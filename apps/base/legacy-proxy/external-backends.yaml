---
# jitcloud (Nextcloud, HTTPS-Backend!) -> 192.168.2.217:443
# Traefik hatte Sticky-Cookie nc_affinity — mit nur EINEM aktiven Backend
# (.218 auskommentiert) ist Stickiness ein No-op, daher hier weggelassen
# (Sticky-Cookies waeren in nginx-inc OSS eh NGINX-Plus-only).
apiVersion: v1
kind: Service
metadata: { name: jitcloud, namespace: legacy-proxy }
spec:
  ports: [{ name: https, port: 443, targetPort: 443 }]
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: jitcloud
  namespace: legacy-proxy
  labels: { kubernetes.io/service-name: jitcloud }
addressType: IPv4
ports: [{ name: https, port: 443 }]
endpoints:
  - addresses: ["192.168.2.217"]
    conditions: { ready: true }
