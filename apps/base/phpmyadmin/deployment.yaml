# Offizielles phpMyAdmin-Image (Projekt-Image, kein Bitnami — deren freier
# Katalog ist seit dem Broadcom-Move als bitnamilegacy eingefroren).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin
  namespace: phpmyadmin
  labels:
    app.kubernetes.io/name: phpmyadmin
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: phpmyadmin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: phpmyadmin
    spec:
      containers:
        - name: phpmyadmin
          # renovate: image=phpmyadmin/phpmyadmin
          image: phpmyadmin/phpmyadmin:5.2.3
          ports:
            - containerPort: 80
          env:
            - name: PMA_HOST
              value: kimai-mariadb.kimai.svc.cluster.local # Default-Server im Login
            - name: PMA_ARBITRARY
              value: "1" # weitere Server (wordpress-mariadb etc.) frei eintragbar
            - name: TZ
              value: Europe/Berlin
            - name: UPLOAD_LIMIT
              value: 64M
            - name: MEMORY_LIMIT
              value: 256M
            - name: MAX_EXECUTION_TIME
              value: "300"
            - name: HIDE_PHP_VERSION
              value: "true"
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 256Mi }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: phpmyadmin
  namespace: phpmyadmin
spec:
  selector:
    app.kubernetes.io/name: phpmyadmin
  ports:
    - port: 80
      targetPort: 80
