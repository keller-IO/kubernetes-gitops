# Bitnami phpMyAdmin chart. Bundled MariaDB disabled; this UI connects to
# existing MariaDB/MySQL services. The default target is Kimai's MariaDB; users
# may enter other service FQDNs on the login screen.
db:
  allowArbitraryServer: false
  host: kimai-mariadb.kimai.svc.cluster.local # CHANGE ME
  port: 3306
  bundleTestDB: false

replicas: 1
resources:
  requests: { cpu: 50m, memory: 128Mi }
  limits: { memory: 256Mi }

extraEnvVars:
  - name: PHPMYADMIN_ALLOW_ARBITRARY_SERVER
    value: "true"
  - name: TZ
    value: Europe/Berlin
  - name: UPLOAD_LIMIT
    value: 64M
  - name: MEMORY_LIMIT
    value: 256M
  - name: MAX_EXECUTION_TIME
    value: "300"
  - name: HIDE_PHP_VERSION
    value: "true"

service:
  type: ClusterIP

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    nginx.org/client-max-body-size: "64m"
  hostname: dbadmin.jit.services # CHANGE ME
  pathType: Prefix
  tls: true
  existingSecretName: phpmyadmin-tls

metrics:
  enabled: false

networkPolicy:
  enabled: false
