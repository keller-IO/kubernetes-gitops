# ENCRYPT BEFORE COMMIT:  sops --encrypt --in-place secret.sops.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: kite-secrets
  namespace: kite
type: Opaque
stringData:
  # `openssl rand -hex 32` for each of these two.
  JWT_SECRET: REPLACE_ME
  KITE_ENCRYPT_KEY: REPLACE_ME
  # OAuth client secret — must match client_secret in the Authentik kite blueprint.
  OAUTH_CLIENT_SECRET: REPLACE_ME
