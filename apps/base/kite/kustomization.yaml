apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kite
# Lightweight Kubernetes dashboard. In-cluster RBAC + Authentik OIDC (see values.yaml).
helmCharts:
  - name: kite
    repo: https://kite-org.github.io/kite
    version: 0.12.3 # renovate: helm
    releaseName: kite
    namespace: kite
    valuesFile: values.yaml

generators:
  - ./secret-generator.yaml
