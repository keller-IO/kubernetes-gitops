apiVersion: k8s.mariadb.com/v1alpha1
kind: Backup
metadata:
  name: kimai-mariadb
  namespace: kimai
spec:
  mariaDbRef:
    name: kimai-mariadb
  schedule:
    cron: "0 2 * * *" # daily 02:00 (5-field cron)
  maxRetention: 720h # 30d
  # Logical dump (mariadb-dump). TODO prod: for PITR use the PhysicalBackup CRD + binlog.
  storage:
    s3:
      bucket: mariadb-kimai # CHANGE ME (bucket must exist)
      endpoint: s3.jit.services # CHANGE ME (Ceph RGW, no scheme)
      region: default
      accessKeyIdSecretKeyRef: { name: kimai-backup-s3, key: ACCESS_KEY_ID }
      secretAccessKeySecretKeyRef: { name: kimai-backup-s3, key: SECRET_ACCESS_KEY }
      tls:
        enabled: true
