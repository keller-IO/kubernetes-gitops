apiVersion: k8s.mariadb.com/v1alpha1
kind: Backup
metadata:
  name: kimai-mariadb
  namespace: kimai
spec:
  mariaDbRef:
    name: kimai-mariadb
  schedule:
    cron: "0 2 * * *" # täglich 02:00 (5-Feld-Cron)
  maxRetention: 720h # 30d
  compression: gzip
  # Logischer Dump (mariadb-dump) nach Garage-S3 (192.168.23.21).
  storage:
    s3:
      bucket: backups
      prefix: mariadb-kimai
      endpoint: 192.168.23.21:3900 # Garage, ohne Schema
      region: garage-potsdam
      accessKeyIdSecretKeyRef: { name: kimai-backup-s3, key: ACCESS_KEY_ID }
      secretAccessKeySecretKeyRef: { name: kimai-backup-s3, key: SECRET_ACCESS_KEY }
      tls:
        enabled: false # Garage spricht HTTP, kein TLS
