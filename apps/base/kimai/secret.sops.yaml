# ENCRYPT BEFORE COMMIT:  sops --encrypt --in-place secret.sops.yaml
apiVersion: v1
kind: Secret
metadata:
  name: kimai-secret
  namespace: kimai
type: Opaque
stringData:
  app-secret: REPLACE_ME # openssl rand -hex 16
  mariadb-root-password: REPLACE_ME
  mariadb-password: REPLACE_ME
  admin-mail: admin@jit.platzhalter # CHANGE ME
  admin-pass: REPLACE_ME
  # OIDC (matches infrastructure/base/authentik/blueprints/kimai-oauth.yaml)
  oidc-client-id: kimai-client-id
  oidc-client-secret: REPLACE_ME
---
# Ceph S3 credentials for mariadb-operator Backup
apiVersion: v1
kind: Secret
metadata:
  name: kimai-backup-s3
  namespace: kimai
type: Opaque
stringData:
  ACCESS_KEY_ID: REPLACE_ME
  SECRET_ACCESS_KEY: REPLACE_ME
