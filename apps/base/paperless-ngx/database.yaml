apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-pg
  namespace: paperless-ngx
spec:
  instances: 1 # 3 for HA
  storage:
    size: 5Gi
    storageClass: ceph-rbd # CNPG-Feld heißt storageClass (nicht storageClassName)
  bootstrap:
    initdb:
      database: paperless
      owner: paperless
      secret:
        name: paperless-db-app
  # Backup (barmanObjectStore) DEAKTIVIERT bis ein EXTERNES S3-Ziel existiert
  # (nicht dasselbe Ceph!). Kaputtes Archive-Target = WAL-Stau = Disk voll
  # (so fiel roundcube-pg am 12.07. aus). backup.yaml ebenfalls deaktiviert.
  monitoring:
    enablePodMonitor: true
