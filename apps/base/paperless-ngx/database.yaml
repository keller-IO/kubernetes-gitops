apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-pg
  namespace: paperless-ngx
spec:
  instances: 1 # 3 for HA
  storage:
    size: 5Gi
    storageClassName: ceph-rbd # CHANGE ME
  bootstrap:
    initdb:
      database: paperless
      owner: paperless
      secret:
        name: paperless-db-app
  # Continuous backup to Ceph S3 (base backup + WAL → PITR). Schedule in backup.yaml.
  # TODO prod: in-tree barmanObjectStore deprecated in CNPG ≥1.26 → migrate to barman-cloud plugin.
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://cnpg-paperless/ # CHANGE ME (bucket must exist)
      endpointURL: https://s3.jit.services # CHANGE ME (Ceph RGW)
      s3Credentials:
        accessKeyId: { name: paperless-backup-s3, key: ACCESS_KEY_ID }
        secretAccessKey: { name: paperless-backup-s3, key: SECRET_ACCESS_KEY }
      wal: { compression: gzip }
      data: { compression: gzip }
  monitoring:
    enablePodMonitor: true
