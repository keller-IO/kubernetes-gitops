# ENCRYPT BEFORE COMMIT:  sops --encrypt --in-place secret.sops.yaml
---
# basic-auth secret consumed by CNPG (initdb owner)
apiVersion: v1
kind: Secret
metadata:
  name: paperless-db-app
  namespace: paperless-ngx
type: kubernetes.io/basic-auth
stringData:
  username: paperless
  password: REPLACE_ME
---
# app env: DB password, secret key, OIDC config (django-allauth JSON)
apiVersion: v1
kind: Secret
metadata:
  name: paperless-secret
  namespace: paperless-ngx
type: Opaque
stringData:
  PAPERLESS_DBPASS: REPLACE_ME # must equal paperless-db-app password
  PAPERLESS_SECRET_KEY: REPLACE_ME # openssl rand -hex 32
  PAPERLESS_ADMIN_USER: admin
  PAPERLESS_ADMIN_PASSWORD: REPLACE_ME
  PAPERLESS_SOCIALACCOUNT_PROVIDERS: |
    {"openid_connect":{"APPS":[{"provider_id":"authentik","name":"Authentik","client_id":"paperless-client-id","secret":"REPLACE_ME","settings":{"server_url":"https://auth.jit.services/application/o/paperless/.well-known/openid-configuration"}}]}}
---
# Ceph S3 credentials for CNPG barman backups
apiVersion: v1
kind: Secret
metadata:
  name: paperless-backup-s3
  namespace: paperless-ngx
type: Opaque
stringData:
  ACCESS_KEY_ID: REPLACE_ME
  SECRET_ACCESS_KEY: REPLACE_ME
