# Standalone Valkey cache — replaces the hyperspike valkey-operator CR.
# Exposes paperless-valkey:6379, the same DNS name the app already uses.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: paperless-valkey
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/name: paperless-valkey
    app.kubernetes.io/component: cache
spec:
  serviceName: paperless-valkey
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-valkey
        app.kubernetes.io/component: cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: valkey
          image: valkey/valkey:8.1-alpine # renovate: image=valkey/valkey
          args: ["--appendonly", "yes"]
          ports:
            - name: valkey
              containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            tcpSocket:
              port: valkey
            initialDelaySeconds: 10
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ceph-rbd # CHANGE ME
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-valkey
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/name: paperless-valkey
    app.kubernetes.io/component: cache
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: paperless-valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
