image:
  tag: 2.20.6 # renovate: image=ghcr.io/paperless-ngx/paperless-ngx — = Version des Alt-Systems (Migration)
env:
  PAPERLESS_URL: https://paperless.jit.services
  PAPERLESS_DBENGINE: postgresql
  PAPERLESS_DBHOST: paperless-pg-rw
  PAPERLESS_DBNAME: paperless
  PAPERLESS_DBUSER: paperless
  PAPERLESS_REDIS: redis://paperless-valkey:6379
  PAPERLESS_TIME_ZONE: Europe/Berlin
  # OCR-Einstellungen wie im Alt-System auf 192.168.2.15
  PAPERLESS_OCR_LANGUAGE: deu+eng
  PAPERLESS_OCR_LANGUAGES: deu # Paket-Liste (Leerzeichen-Format), eng ist im Image enthalten
  PAPERLESS_OCR_MODE: skip
  PAPERLESS_OCR_CLEAN: clean
  PAPERLESS_OCR_ROTATE_PAGES: "true"
  # OIDC via django-allauth (matches authentik paperless-oauth blueprint)
  PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
envFrom:
  - secretRef:
      name: paperless-secret
# Bitnami-redis-Subchart des Charts abschalten (Images tot, wir nutzen die
# eigene Valkey-Instanz aus cache.yaml — PAPERLESS_REDIS zeigt dorthin).
redis:
  enabled: false
persistence:
  data:
    enabled: true
    storageClass: ceph-rbd # CHANGE ME
    accessMode: ReadWriteOnce
    size: 5Gi
  media:
    enabled: true
    # RWO statt CephFS/RWX: Single-Replica reicht; zurück auf ceph-fs/RWX,
    # sobald der CephFS-Treiber deployt ist (client.kubernetes braucht mds-Caps).
    storageClass: ceph-rbd
    accessMode: ReadWriteOnce
    size: 20Gi
  consume:
    enabled: true
    storageClass: ceph-rbd
    accessMode: ReadWriteOnce
    size: 2Gi
  export:
    enabled: true
    storageClass: ceph-rbd # CHANGE ME
    accessMode: ReadWriteOnce
    size: 2Gi
resources:
  requests: { cpu: 200m, memory: 512Mi }
  limits: { memory: 1Gi }
# bjw-s common-library: ingress is a named map (main), not a flat block.
ingress:
  main:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.org/ssl-redirect: "false"
      nginx.org/redirect-to-https: "true"
      nginx.org/client-max-body-size: "100m"
    hosts:
      - host: paperless.jit.services # CHANGE ME
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: 8000
    tls:
      - hosts: [paperless.jit.services] # CHANGE ME
        secretName: paperless-tls
