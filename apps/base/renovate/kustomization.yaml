apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: renovate
# Self-hosted Renovate as a CronJob, scanning the Forgejo instance (platform: gitea).
resources:
  - cronjob.yaml
  - secret.sops.yaml
configMapGenerator:
  - name: renovate-config
    files:
      - config.js
generatorOptions:
  disableNameSuffixHash: true
