replicaCount: 1
collabora:
  # WOPI hosts allowed to embed the editor (aus dem Swarm-Setup übernommen:
  # jit.cloud ist die Nextcloud, die Collabora einbindet).
  aliasgroups:
    - host: "https://jit\\.cloud"
    - host: "https://.*\\.jit\\.services"
  extra_params: --o:ssl.enable=false --o:ssl.termination=true
  # admin console credentials come from env (see existingSecret below)
existingSecret:
  enabled: true
  secret: collabora-secret
  usernameKey: username
  passwordKey: password
resources:
  requests: { cpu: 250m, memory: 512Mi }
  limits: { memory: 1Gi }
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    nginx.org/websocket-services: collabora-collabora-online # MUSS dem Service-Namen entsprechen, sonst verwirft NGINX den ganzen Ingress
  hosts:
    - host: office.jit.services # CHANGE ME
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts: [office.jit.services] # CHANGE ME
      secretName: collabora-tls
