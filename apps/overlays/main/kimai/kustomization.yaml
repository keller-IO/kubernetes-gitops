apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kimai
# Seit dem .15-Ausfall (14.07.) terminiert der Cluster TLS selbst
# (cert-manager via HTTP-01). redirect-to-https bleibt aus, bis das
# Zertifikat steht.
resources:
  - ../../../base/kimai
patches:
  - target: { kind: Ingress, name: kimai }
    patch: |
      - op: replace
        path: /metadata/annotations/nginx.org~1redirect-to-https
        value: "false"
      - op: replace
        path: /spec/tls/0/hosts
        value:
          - kimai.savar.de
      - op: replace
        path: /spec/rules/0/host
        value: kimai.savar.de
  - target: { kind: Deployment, name: kimai }
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: kimai.savar.de|kimai.jit.services|localhost|127.0.0.1|kimai|nginx|traefik
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/httpHeaders/0/value
        value: kimai.savar.de
