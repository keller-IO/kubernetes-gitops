apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: wordpress-1
# Instanz "jugend": Migration von 192.168.2.15 (/opt/containers/jugendbeauftragter).
# TLS endet waehrend der Migration noch am Traefik auf 192.168.2.15; Traefik
# leitet HTTP an den K8s-Ingress auf 192.168.2.246 weiter.
resources:
  - ../../../base/wordpress
patches:
  - target: { kind: Ingress }
    patch: |
      - op: remove
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
      - op: replace
        path: /metadata/annotations/nginx.org~1redirect-to-https
        value: "false"
      - op: remove
        path: /spec/tls
      - op: replace
        path: /spec/rules/0/host
        value: jugendbeauftragter-halbe.de
      - op: add
        path: /spec/rules/-
        value:
          host: www.jugendbeauftragter-halbe.de
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: wordpress
                    port:
                      number: 80
  - target: { kind: Backup, name: wordpress-mariadb }
    patch: |
      - op: replace
        path: /spec/storage/s3/prefix
        value: mariadb-wordpress-1
