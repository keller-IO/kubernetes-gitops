apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: wordpress-2
# Instanz "halbe" (Migration von 192.168.2.15). Seit dem .15-Ausfall (14.07.)
# terminiert der Cluster TLS selbst: cert-manager via HTTP-01. redirect-to-https
# bleibt aus, bis das Zertifikat steht.
resources:
  - ../../../base/wordpress
patches:
  - target: { kind: Ingress }
    patch: |
      - op: replace
        path: /metadata/annotations/nginx.org~1redirect-to-https
        value: "false"
      - op: replace
        path: /spec/tls/0/hosts
        value:
          - www.gemeinsam-fuer-halbe.de
          - gemeinsam-fuer-halbe.de
      - op: replace
        path: /spec/rules/0/host
        value: www.gemeinsam-fuer-halbe.de
      - op: add
        path: /spec/rules/-
        value:
          host: gemeinsam-fuer-halbe.de
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: wordpress
                    port:
                      number: 80
  - target: { kind: Backup, name: wordpress-mariadb }
    patch: |
      - op: replace
        path: /spec/storage/s3/prefix
        value: mariadb-wordpress-2
