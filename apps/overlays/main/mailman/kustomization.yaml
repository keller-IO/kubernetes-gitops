apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mailman
# lists.jitmail.de öffentlich über den .15-Traefik (TLS dort, HTTP zum Cluster)
# -> HTTP-only, sonst 301-Loop. Für Cluster-direktes TLS: Router 443 -> .246 +
# tls/issuer wieder ergänzen.
resources:
  - ../../../base/mailman
patches:
  - target: { kind: Ingress, name: mailman }
    patch: |
      - op: remove
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
      - op: replace
        path: /metadata/annotations/nginx.org~1redirect-to-https
        value: "false"
      - op: remove
        path: /spec/tls
      - op: replace
        path: /spec/rules/0/host
        value: lists.jitmail.de
