apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mailman
# lists.jitmail.de liegt nicht in der jit.services-Zone: TLS terminiert
# übergangsweise am Legacy-Traefik (.15), der HTTP an den Ingress (.246)
# weiterleitet — gleiches Muster wie kimai/wordpress-1/2.
resources:
  - ../../../base/mailman
patches:
  - target: { kind: Ingress, name: mailman }
    patch: |
      - op: remove
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
      - op: replace
        path: /metadata/annotations/nginx.org~1redirect-to-https
        value: "false"
      - op: remove
        path: /spec/tls
      - op: replace
        path: /spec/rules/0/host
        value: lists.jitmail.de
