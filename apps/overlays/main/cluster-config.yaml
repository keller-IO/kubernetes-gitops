# Central hostname reference for the `main` cluster. Placeholder domain: *.jit.services
# Each app overlay patches its Ingress host from this list. Search & replace `jit.services`
# with the real domain when going to production (see docs/PRODUCTION-READINESS.md).
#
# NOTE: This file sits directly in overlays/main/ and is intentionally NOT a kustomize
# overlay dir, so the apps ApplicationSet (which globs overlays/main/*/) ignores it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-config
data:
  domain: jit.services
  host_argocd: argocd.jit.services
  host_authentik: auth.jit.services
  host_metrics: metrics.jit.services # vmsingle-Datasource fürs Haupt-Grafana (192.168.23.9)
  host_kimai: kimai.jit.services
  host_roundcube: webmail.jit.services
  host_collabora: office.jit.services
  host_paperless: paperless.jit.services
  host_forgejo: git.jit.services
  host_wordpress_1: site1.jit.services
  host_wordpress_2: site2.jit.services
  host_wordpress_3: site3.jit.services
  host_mastodon: social.jit.services
  host_gatus: status.jit.services
  host_kite: kite.jit.services
  host_mailman: lists.jit.services
  host_icecast: radio.jit.services
  host_phpmyadmin: dbadmin.jit.services
